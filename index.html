<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/6487f0a3d4.js"crossorigin="anonymous"></script>
    <script src="app.js"></script>
</head>
<body>
    <div class="wrapper">
        <div class="logo">
            <div class="container">
            <img src="assets/omdb-logo.jpeg" alt="OMDb logo">
            </div>
        </div>
        <div class="search-container">
            <div class="search-element">
            <h3>Search Movie:</h3>
            <input type="text" class="form-control"
                placeholder="Movie Title ..." id="movie-search-box"
                onkeyup="findMovies()">
            <div class="search-list" id="search-list">
                <!-- <div class="search-list-item">
                    <div class="search-item-thumbnail">
                        <img src="assets/Into-Thin-Air.jpg">
                    </div>
                    <div class="search-item-info">
                        <h3 class="movie-title">Into Thin Air-Death on Everest</h3>
                        <ul class="movie-misc-info">
                            <li class="year">1996</li>
                        </ul>
                    </div>
                </div>   -->
            </div>
        </div>
        </div>
        <div class="container">
            <div class="results-container">
                <div class="result-grid" id="result-grid">
                    <div class="movie-poster">
                        <img src="assets/Jurassic-Park.jpg" alt="best movie ever">
                    </div>
                    <div class="movie-info">
                    <h3 class="movie-title">Jurassic Park</h3>
                    <ul class="movie-misc-info">
                        <li class="year">1993</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
<footer>
        <div class="container__footer container">
          <div class="row--footer row">
            <div class="footer__column">
              <h3 class="footer__column--title">SIGN IN</h3><a href="#" class=""></a>
            </div>
            <div class="footer__column">
              <h3 class="footer__column--title">SITE INDEX</h3><a href="#" class=""></a>
            </div>
            <div class="footer__column">
              <h3 class="footer__column--title">PRESS</h3><a href="#" class=""></a>
            </div>
            <div class="footer__column">
              <h3 class="footer__column--title">CAREERS</h3><a href="#" class=""</a>
          </div>
        </div>
          <div class="footer__links">
              <a href="#" class="footer__link"><i class="fa-brands fa-facebook-f"></i></a>
              <a href="#" class="footer__link"><i class="fa-brands fa-twitter"></i></a>
              <a href="#" class="footer__link"><i class="fa-brands fa-youtube"></i></a>
          </div>
          <div class="copyright">
             <p> Copyright 2026 OMDb. All rights reserved.</p>          
        </div>
       </div>
    </footer> 
</html>
