<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Search</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://kit.fontawesome.com/6487f0a3d4.js"crossorigin="anonymous"></script>
    <script src="app.js"></script>
</head>
<body>
    <div class="wrapper">
        <div class="logo">
            <div class="container">
            <img src="assets/omdb-logo.jpeg" alt="OMDb logo">
            </div>
        </div>
        <div class="search-container">
            <div class="search-element">
            <h3>Search Movie:</h3>
            <input type="text" class="form-control"
                placeholder="Search Movie Title ..." id="movie-search-box">
            <div class="search-list" id="search-list">
                <div class="search-list-item">
                    <div class="search-item-thumnail">
                        <img src="assets/Into-Thin-Air.jpg">
                    </div>
                    <div class="search-item-info">
                        <h3>Into Thin Air - Death on Everest</h3>
                        <p>1996</p>
                    </div>
                </div>  
            </div>
        </div>
        </div>
        <div class="container">
            <div class="results-container">
                <div class="result-grid" id="result-grid">
                    <div class="movie-poster">
                        <img src="assets/Jurassic-Park.jpg" alt="best movie ever">
                    </div>
                    <div class="movie-info">
                    <h3 class="movie-title">Jurassic Park</h3>
                    <ul class="movie-misc-info">
                        <li class="year">Year: 1993</li>
                        <li class="rated">Rating: PG-13</li>
                    </ul>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
